name = "VisuTek 3D Viewer"
client_id = "YOUR_SHOPIFY_PARTNER_CLIENT_ID"
application_url = "https://app.visutek.io"
embedded = false

[access_scopes]
scopes = "read_products,write_products,read_orders"

[auth]
redirect_urls = [
  "https://app.visutek.io/auth/shopify/callback",
  "http://localhost:3001/auth/shopify/callback"
]

[webhooks]
api_version = "2024-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = ["products/delete"]
  uri = "/webhooks/products-delete"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "YOUR_DEV_STORE.myshopify.com"
