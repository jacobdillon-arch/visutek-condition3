services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: visutek
      POSTGRES_USER: visutek
      POSTGRES_PASSWORD: visutek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visutek -d visutek"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO (local S3) ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── MinIO bucket init ─────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123 &&
        mc mb local/visutek-models --ignore-existing &&
        mc anonymous set download local/visutek-models &&
        echo 'MinIO bucket ready'
      "
    restart: on-failure

  # ── Backend (Express API) ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://visutek:visutek@postgres:5432/visutek
      JWT_SECRET: dev-jwt-secret-not-for-production-use-ok
      ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
      S3_BUCKET: visutek-models
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_FORCE_PATH_STYLE: "true"
      HOST: http://localhost:3001
      ADMIN_URL: http://localhost:3000
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
      - ./packages/shared/src:/app/packages/shared/src
    restart: unless-stopped

  # ── Admin Dashboard (Next.js) ─────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: development
    depends_on:
      - backend
    volumes:
      - ./apps/admin/app:/app/apps/admin/app
      - ./apps/admin/lib:/app/apps/admin/lib
      - ./apps/admin/components:/app/apps/admin/components
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
