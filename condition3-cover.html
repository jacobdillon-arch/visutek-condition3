<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisuTek — Condition 3</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: #0a0a0a;
  color: #ffffff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px;
}

.container {
  text-align: center;
  max-width: 600px;
  width: 100%;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 96px;
  letter-spacing: 0.12em;
  color: #ffffff;
  margin-bottom: 24px;
  line-height: 1;
}

.subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  margin-bottom: 80px;
}

.buttons {
  display: flex;
  gap: 24px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #ffffff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 18px 48px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn:hover {
  background: #ffffff;
  color: #0a0a0a;
  border-color: #ffffff;
}

@media (max-width: 768px) {
  .logo {
    font-size: 64px;
  }
  
  .buttons {
    flex-direction: column;
    gap: 16px;
  }
  
  .btn {
    width: 100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1 class="logo">VISUTEK</h1>
  <p class="subtitle">PRODUCT VISUALIZATION STUDY — CONDITION 3</p>
  
  <div class="buttons">
    <a href="condition3-ar-mens.html" class="btn">SHOP MEN'S</a>
    <a href="condition3-ar-womens.html" class="btn">SHOP WOMEN'S</a>
  </div>
</div>

</body>
</html>
